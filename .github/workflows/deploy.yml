name: Deploy Tagwerk to GitHub Pages

# Baut die PWA und veröffentlicht sie auf GitHub Pages.
# Hinweis: In den Repo-Einstellungen einmalig Pages-Quelle auf "GitHub Actions" stellen.
on:
  push:
    branches:
      - main
      - claude/health-tracking-pwa-ulddw8
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deploy gleichzeitig.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Pfad muss exakt (case-sensitive!) zum Repo-Namen passen:
          # https://<user>.github.io/Healthtracker/
          BASE_PATH: /Healthtracker/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
